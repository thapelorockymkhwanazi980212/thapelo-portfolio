<mat-toolbar class="navbar">

  <button mat-icon-button class="hamburger-btn" (click)="toggleMenu()">
    <mat-icon>{{ menuOpen ? 'close' : 'menu' }}</mat-icon>
  </button>

  <div class="logo">
    <span class="logo-icon">T</span>
    <span class="logo-text">Thapelo <br> Mkhwanazi</span>
  </div>

  <span class="spacer"></span>

  <!-- Nav Links with active highlight -->
  <div class="nav-links">
    @for (link of navLinks; track link.label) {
    <a mat-button
       (click)="scrollTo(link.section)"
       [class.active-link]="activeSection === link.section">
      {{ link.label }}
    </a>
    }
  </div>

  <button mat-stroked-button class="talk-btn"
          onclick="window.open('https://github.com/thapelorockymkhwanazi980212', '_blank')">
    Projects
  </button>

</mat-toolbar>

<!-- Mobile Dropdown Menu -->
<div class="mobile-menu" [class.open]="menuOpen">
  @for (link of navLinks; track link.label) {
  <a class="mobile-link"
     (click)="scrollTo(link.section)"
     [class.active-mobile-link]="activeSection === link.section">
    {{ link.label }}
  </a>
  }
</div>

@if (menuOpen) {
<div class="overlay" (click)="closeMenu()"></div>
}
